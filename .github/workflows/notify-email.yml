name: Notificación por correo en push

on:
  push:
    branches:
      - main
      - feature_a
      - feature_b

jobs:
  send_email:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar correo de notificación
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Cambios subidos a rama ${{ github.ref_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            Se han subido cambios a la rama "${{ github.ref_name }}" del repositorio ${{ github.repository }}.
            Autor del push: ${{ github.actor }}
            Commit: ${{ github.sha }}
            Mensaje: ${{ github.event.head_commit.message }}

            Ver en GitHub: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
